<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://sg-flight-proxy.danielsykes.workers.dev; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'">
  <title>Flight Radar – Singapore</title>
  <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
  <div id="app">
    <header>
      <div id="clock"></div>
      <div class="title">FLIGHT RADAR</div>
      <div id="stats"></div>
    </header>

    <div class="content">
      <canvas id="radar"></canvas>
      <aside id="flight-list">
        <div class="list-header">TRACKED</div>
        <div id="flights"></div>
        <div id="wind-info" class="wind-box">WIND --</div>
      </aside>
    </div>

    <footer>
      <span id="updated"></span>
      <span class="source">OpenSky Network</span>
    </footer>
  </div>

  <script src="js/app.js?v=6"></script>
</body>
</html>
